name: trust_hire_app
description: "A new Flutter project."


publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0



#-------PACKAGES----------#


dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.12.4

  #-------UTILITY PACKAGES----------#

  #ICONS
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  intl: ^0.18.1
  logger: ^2.0.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2

  #STATE MANAGEMENT
  get: ^4.6.5
  get_storage: ^2.1.1

  #OTHERS
  google_fonts: ^8.1.0
  smooth_page_indicator: ^2.0.1


  #-------PACKAGES END----------#

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

 #--------LOCAL ASSETS-------
  assets:
    - assets/images/
    - assets/images/OnBoardingImages/image1.png
    - assets/images/OnBoardingImages/image2.png
    - assets/images/OnBoardingImages/image3.png
    - assets/images/LogoImages/facebooklLogo.png
    - assets/images/LogoImages/googleLogo.png
    - assets/images/LogoImages/AppLogo.png
    - assets/images/burnedout_images/balance.png.png
    - assets/images/burnedout_images/exhausted.png.png
    - assets/images/burnedout_images/motivation.png.png
    - assets/images/burnedout_images/overall.png.png
    - assets/images/burnedout_images/sleep.png.png
    - assets/images/burnedout_images/team.png.png




  #--------LOCAL ASSETS-------

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Black.ttf
        - asset: assets/fonts/Poppins-BlackItalic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-BoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 300
        - asset: assets/fonts/Poppins-ThinItalic.ttf
          weight: 300
          style: italic




